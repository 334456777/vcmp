syntax = "proto3";

package vcmp;

option go_package = "vcmp/proto";

// AnalysisResult 保存视频分析的完整结果
message AnalysisResult {
  // 被分析的视频文件路径
  string video_file = 1;
  
  // 视频帧率
  double fps = 2;
  
  // 视频宽度（像素）
  int32 width = 3;
  
  // 视频高度（像素）
  int32 height = 4;
  
  // 视频总帧数
  int32 total_frames = 5;
  
  // 自动计算的建议阈值
  double suggested_threshold = 6;
  
  // 每一帧的差异像素数量
  repeated uint32 diff_counts = 7;
}
